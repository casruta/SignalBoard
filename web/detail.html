<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SignalBoard stock detail — DCF valuation, financial statements, and risk analysis.">
<title>SignalBoard</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css?v=18">
</head>
<body data-page="detail">
  <div class="detail-topbar">
    <a href="#" class="back-btn" id="back-btn">
      <span class="chevron">&#8249;</span> Back
    </a>
    <h1 id="detail-title"></h1>
    <div style="width:60px"></div>
  </div>
  <div class="report-layout">
    <nav id="report-toc" class="report-toc"></nav>
    <div class="detail-container">
      <div class="detail-content" id="detail-content">
        <div class="loading"></div>
      </div>
    </div>
    <aside id="explain-panel" class="explain-panel">
      <div class="explain-panel-inner">
        <button class="explain-close" id="explain-close">&times;</button>
        <h4 class="explain-term" id="explain-term"></h4>
        <p class="explain-text" id="explain-text"></p>
        <p class="explain-why" id="explain-why"></p>
        <div id="explain-math-container"></div>
      </div>
    </aside>
  </div>

  <script src="/static/app.js?v=18"></script>
</body>
</html>
