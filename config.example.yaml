# Copy this file to config.yaml and fill in your API keys
# config.yaml is gitignored — your keys stay local

fred:
  api_key: "YOUR_FRED_API_KEY"  # Get one free at https://fred.stlouisfed.org/docs/api/api_key.html

fmp:
  api_key: ""  # Optional. Financial Modeling Prep fallback. Get free at https://site.financialmodelingprep.com/

universe:
  discovery_method: "curated_smallmid"
  # empty = use universe builder (see data/universe_builder.py)
  tickers: []
  max_market_cap: 20000000000   # $20B
  min_daily_volume: 100000
  lookback_years: 10

screening:
  enabled: true
  top_n: 50                      # Number of stocks to keep after dynamic screening
  min_market_cap: 300000000      # $300M minimum
  max_market_cap: 20000000000    # $20B maximum
  min_altman_z: 1.81             # Not in distress zone

strategy:
  max_positions: 20
  max_position_size_pct: 10.0
  max_sector_exposure_pct: 25.0
  max_portfolio_drawdown_pct: 10.0
  daily_loss_limit_pct: 2.0
  take_profit_pct: 5.0
  stop_loss_pct: 3.0
  trailing_stop_trigger_pct: 3.0
  trailing_stop_distance_pct: 1.5
  time_stop_days: 15
  min_confidence_threshold: 0.70
  push_notification_threshold: 0.75

model:
  target_horizon_days: 10
  target_threshold: "adaptive"
  train_window_years: 2
  validation_window_months: 3
  retrain_frequency_days: 30
  use_ensemble: false              # Train StackingEnsemble (LightGBM + XGBoost + Ridge)
  calibrate_probabilities: true    # Fit isotonic calibration on validation set
  check_regime_shift: true         # Run adversarial validation between folds
  use_focal_loss: true             # Focal loss for class imbalance (focuses on BUY/SELL)
  focal_gamma: 2.0                 # Focal loss gamma (higher = more focus on hard examples)
  multi_horizon: false             # Train models at 5/10/20-day horizons with consensus
  horizons: [5, 10, 20]           # Prediction horizons for multi-horizon consensus
  horizon_weights: [0.3, 0.4, 0.3]
  regime_conditional: false        # Train per-regime models (bull/bear/sideways)
  n_regimes: 3
  regime_blend_weight: 0.7         # Weight for regime-specific vs fallback model

dcf:
  terminal_growth: 0.02           # 2% terminal growth rate (conservative)
  equity_risk_premium: 0.06       # 6% ERP (conservative)
  projection_years: 5
  micro_cap_premium: 0.025        # +2.5% WACC for market cap < $300M
  small_cap_premium: 0.020        # +2.0% WACC for market cap < $2B
  lower_mid_cap_premium: 0.010    # +1.0% WACC for market cap < $5B
  mid_cap_premium: 0.005          # +0.5% WACC for market cap < $20B

backtest:
  adaptive_slippage: false         # Use AdaptiveSlippageModel instead of fixed 5bps
  include_network_signals: true    # Add correlation network features to signal matrix

server:
  host: "0.0.0.0"
  port: 8000
  database_path: "server/signals.db"
  daily_run_hour: 16
  daily_run_minute: 30
  timezone: "US/Eastern"

apns:
  key_path: "path/to/AuthKey.p8"
  key_id: "YOUR_KEY_ID"
  team_id: "YOUR_TEAM_ID"
  bundle_id: "com.yourname.SignalBoard"
  use_sandbox: true
